trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  ProjectPath: '$(Build.SourcesDirectory)\InvoiceBot'
  PackageOutput: '$(Build.ArtifactStagingDirectory)'
  VersionNumber: '1.0.$(Build.BuildId)'

stages:

# =========================
# Stage 1: Build + Pack
# =========================
- stage: Build
  displayName: 'Build and Pack'

  jobs:
  - job: PackJob
    steps:

    - checkout: self

    # Pack UiPath project
    - task: UiPathPack@2
      displayName: 'Pack UiPath Project'
      inputs:
        versionType: 'ManualVersion'
        version: '$(VersionNumber)'
        projectJsonPath: '$(ProjectPath)'
        outputPath: '$(PackageOutput)'

    # Publish package artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish NuGet Package'
      inputs:
        PathtoPublish: '$(PackageOutput)'
        ArtifactName: 'drop'


# =========================
# Stage 2: Deploy to Dev
# =========================
- stage: Deploy_Dev
  displayName: 'Deploy to Dev'
  dependsOn: Build

  jobs:
  - deployment: DevDeploy
    environment: 'UiPath-Dev'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: UiPathDeploy@2
            displayName: 'Deploy to Dev Orchestrator'
            inputs:
              orchestratorConnection: 'UiPath-Dev-ServiceConnection'
              packagesPath: '$(Pipeline.Workspace)\drop'
              folderName: 'DEV'


# =========================
# Stage 3: Approval + UAT
# =========================
- stage: Deploy_UAT
  displayName: 'Approval and UAT'
  dependsOn: Deploy_Dev

  jobs:
  - deployment: UATDeploy
    environment: 'UiPath-UAT'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: UiPathDeploy@2
            displayName: 'Deploy to UAT'
            inputs:
              orchestratorConnection: 'UiPath-UAT-ServiceConnection'
              packagesPath: '$(Pipeline.Workspace)\drop'
              folderName: 'UAT'